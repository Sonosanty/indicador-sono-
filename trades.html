<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sono Pro — Trading Journal</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/sono.css" />
</head>
<body>

<nav class="sono-nav">
  <a href="/" class="nav-brand">SONO <span>PRO v5</span></a>
        <div class="nav-links">
        <a href="/" class="nav-link active">📊 <span class="nav-text">Dashboard</span></a>
        <a href="/rangos.html" class="nav-link">🎯 <span class="nav-text">Rangos</span></a>
        <a href="/metodo.html" class="nav-link">📐 <span class="nav-text">Metodo</span></a>
        <a href="/trades.html" class="nav-link">📝 <span class="nav-text">Trades</span></a>
      </div>
  <div class="nav-right">
    <span style="font-size:0.7rem;color:var(--txt-2)">💾 localStorage</span>
  </div>
</nav>

<div class="page">

  <!-- KPIs -->
  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi-card"><div class="kpi-val" id="kpi-total">0</div><div class="kpi-lbl">Total Trades</div></div>
    <div class="kpi-card"><div class="kpi-val green" id="kpi-wr">--%</div><div class="kpi-lbl">Win Rate</div></div>
    <div class="kpi-card"><div class="kpi-val" id="kpi-pf">--</div><div class="kpi-lbl">Profit Factor</div></div>
    <div class="kpi-card"><div class="kpi-val" id="kpi-rr">--</div><div class="kpi-lbl">R:R Medio</div></div>
    <div class="kpi-card"><div class="kpi-val" id="kpi-pnl">$0</div><div class="kpi-lbl">Net P&L</div></div>
  </div>

  <!-- Equity Curve -->
  <div class="card mb-12">
    <div class="flex-between mb-12">
      <div class="card-title" style="margin:0">EQUITY CURVE</div>
      <div style="font-size:0.65rem;color:var(--txt-2)" id="equity-info">--</div>
    </div>
    <canvas id="equity-canvas" height="120" style="width:100%;border-radius:6px;background:var(--bg-2)"></canvas>
  </div>

  <!-- ADD TRADE FORM -->
  <div class="card mb-12">
    <div class="card-title">AÑADIR TRADE</div>
    <div class="trade-form" id="trade-form">
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input type="date" id="f-date" class="form-input" />
      </div>
      <div class="form-group">
        <label class="form-label">Activo</label>
        <select id="f-asset" class="form-select">
          <option>BTC</option><option>ETH</option><option>SOL</option><option>XRP</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Dirección</label>
        <select id="f-dir" class="form-select">
          <option value="LONG">LONG</option>
          <option value="SHORT">SHORT</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Entrada ($)</label>
        <input type="number" id="f-entry" class="form-input" placeholder="0.00" step="0.01" />
      </div>
      <div class="form-group">
        <label class="form-label">Salida ($)</label>
        <input type="number" id="f-exit" class="form-input" placeholder="0.00 (vacio=abierto)" step="0.01" />
      </div>
      <div class="form-group">
        <label class="form-label">Tamaño ($)</label>
        <input type="number" id="f-size" class="form-input" placeholder="100" step="1" />
      </div>
      <div class="form-group">
        <label class="form-label">Setup</label>
        <input type="text" id="f-setup" class="form-input" placeholder="Score > 65, RSI..." />
      </div>
      <div class="form-group">
        <label class="form-label">Nota</label>
        <input type="text" id="f-note" class="form-input" placeholder="Observaciones..." />
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-green" onclick="addTrade()">+ Añadir Trade</button>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ Exportar CSV</button>
      <button class="btn btn-ghost" onclick="clearFilters()">↺ Todos</button>
      <select class="form-select" id="filter-dir" onchange="renderTable()" style="width:auto;padding:6px 10px">
        <option value="">Todos</option>
        <option value="LONG">LONG</option>
        <option value="SHORT">SHORT</option>
        <option value="OPEN">Abiertos</option>
      </select>
      <select class="form-select" id="filter-result" onchange="renderTable()" style="width:auto;padding:6px 10px">
        <option value="">Resultado</option>
        <option value="win">Win</option>
        <option value="loss">Loss</option>
      </select>
    </div>
  </div>

  <!-- TRADES TABLE -->
  <div class="card">
    <div class="card-title">HISTORIAL DE TRADES (<span id="count-label">0</span>)</div>
    <div class="trades-table-wrap" id="table-wrap">
      <table class="trades-table">
        <thead>
          <tr>
            <th>Fecha</th><th>Activo</th><th>Dir</th><th>Entrada</th>
            <th>Salida</th><th>P&L</th><th>P&L%</th><th>R:R</th>
            <th>Setup</th><th>Nota</th><th></th>
          </tr>
        </thead>
        <tbody id="trades-tbody">
          <tr><td colspan="11" style="text-align:center;color:var(--txt-3);padding:30px">
            Sin trades aún. Añade tu primer trade arriba.
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
/* ── Storage ──────────────────────────────────────────────── */
const STORAGE_KEY = 'sono-trades-v5';
let trades = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(trades)); }

/* ── Helpers ──────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const fmt = (v, d=2) => isNaN(v) || v === null ? '--' : Number(v).toLocaleString('es-ES', {minimumFractionDigits:d, maximumFractionDigits:d});

function calcPnL(trade) {
  if (!trade.exit) return { pnl: null, pnlPct: null };
  const dir = trade.direction === 'LONG' ? 1 : -1;
  const pnlPct = ((trade.exit - trade.entry) / trade.entry) * 100 * dir;
  const pnl = (trade.size || 100) * pnlPct / 100;
  return { pnl, pnlPct };
}

/* ── Add Trade ────────────────────────────────────────────── */
function addTrade() {
  const entry = parseFloat($('f-entry').value);
  const exit  = $('f-exit').value ? parseFloat($('f-exit').value) : null;
  const size  = parseFloat($('f-size').value) || 100;
  if (!entry) { alert('Introduce el precio de entrada'); return; }

  const trade = {
    id: Date.now().toString(),
    date: $('f-date').value || new Date().toISOString().split('T')[0],
    asset: $('f-asset').value,
    direction: $('f-dir').value,
    entry, exit, size,
    setup: $('f-setup').value,
    note: $('f-note').value,
    rr: null
  };

  // Auto R:R (asume 1R = 1%)
  if (exit) {
    const { pnlPct } = calcPnL(trade);
    trade.rr = pnlPct > 0 ? (pnlPct / 1).toFixed(2) : (pnlPct / 1).toFixed(2);
  }

  trades.unshift(trade);
  save();
  renderAll();

  // Clear form
  ['f-entry','f-exit','f-size','f-setup','f-note'].forEach(id => $(id).value = '');
}

function deleteTrade(id) {
  if (!confirm('¿Eliminar este trade?')) return;
  trades = trades.filter(t => t.id !== id);
  save(); renderAll();
}

/* ── Stats ────────────────────────────────────────────────── */
function calcStats(list) {
  const closed = list.filter(t => t.exit);
  if (!closed.length) return { wr: 0, pf: 0, rr: 0, pnl: 0, wins: 0, losses: 0 };

  let wins = 0, losses = 0, grossW = 0, grossL = 0, totalPnL = 0, totalRR = 0;
  closed.forEach(t => {
    const { pnl } = calcPnL(t);
    totalPnL += pnl || 0;
    if (pnl > 0) { wins++; grossW += pnl; }
    else { losses++; grossL += Math.abs(pnl); }
    if (t.rr) totalRR += parseFloat(t.rr);
  });

  return {
    wr: wins / closed.length * 100,
    pf: grossL > 0 ? grossW / grossL : wins > 0 ? 99 : 0,
    rr: closed.length > 0 ? totalRR / closed.length : 0,
    pnl: totalPnL, wins, losses,
    total: list.length, closed: closed.length
  };
}

/* ── Equity Curve ────────────────────────────────────────── */
function drawEquity(list) {
  const canvas = $('equity-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 600;
  const H = 120;
  canvas.width = W * window.devicePixelRatio;
  canvas.height = H * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.clearRect(0, 0, W, H);

  const closed = [...list].filter(t => t.exit).reverse();
  if (closed.length < 2) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.font = '12px JetBrains Mono';
    ctx.fillText('Añade al menos 2 trades cerrados', 20, 60);
    return;
  }

  let equity = 0;
  const curve = [0, ...closed.map(t => { const { pnl } = calcPnL(t); equity += pnl || 0; return equity; })];

  const minE = Math.min(...curve);
  const maxE = Math.max(...curve);
  const range = maxE - minE || 1;
  const pad = range * 0.1;

  const toX = i => (i / (curve.length - 1)) * (W - 20) + 10;
  const toY = v => H - ((v - minE + pad) / (range + pad * 2)) * (H - 20) - 10;

  // Fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, equity > 0 ? 'rgba(0,208,133,0.3)' : 'rgba(255,77,106,0.3)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  curve.forEach((v, i) => i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v)));
  ctx.lineTo(toX(curve.length-1), H);
  ctx.lineTo(toX(0), H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.strokeStyle = equity >= 0 ? '#00d085' : '#ff4d6a';
  ctx.lineWidth = 2;
  curve.forEach((v, i) => i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v)));
  ctx.stroke();

  // Baseline
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.moveTo(10, toY(0)); ctx.lineTo(W-10, toY(0));
  ctx.stroke();
  ctx.setLineDash([]);

  $('equity-info').textContent = closed.length + ' trades · Net P&L: $' + equity.toFixed(2);
}

/* ── Render Table ────────────────────────────────────────── */
function getFiltered() {
  const dirF    = $('filter-dir').value;
  const resultF = $('filter-result').value;
  return trades.filter(t => {
    if (dirF === 'OPEN' && t.exit) return false;
    if (dirF === 'LONG' && t.direction !== 'LONG') return false;
    if (dirF === 'SHORT' && t.direction !== 'SHORT') return false;
    if (resultF === 'win' && (!t.exit || calcPnL(t).pnl <= 0)) return false;
    if (resultF === 'loss' && (!t.exit || calcPnL(t).pnl >= 0)) return false;
    return true;
  });
}

function renderTable() {
  const list = getFiltered();
  $('count-label').textContent = list.length;
  const tbody = $('trades-tbody');

  if (!list.length) {
    tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;color:var(--txt-3);padding:30px">Sin trades que mostrar.</td></tr>';
    return;
  }

  tbody.innerHTML = list.map(t => {
    const { pnl, pnlPct } = calcPnL(t);
    const isWin = pnl !== null && pnl > 0;
    const isOpen = !t.exit;
    return `<tr>
      <td>${t.date}</td>
      <td>${t.asset}</td>
      <td><span class="tag-${t.direction.toLowerCase()}">${t.direction}</span></td>
      <td>$${fmt(t.entry, t.entry > 100 ? 0 : 4)}</td>
      <td>${isOpen ? '<span class="tag-open">ABIERTO</span>' : '$'+fmt(t.exit, t.exit > 100 ? 0 : 4)}</td>
      <td class="${isOpen ? '' : isWin ? 'win' : 'loss'}">${pnl !== null ? (pnl > 0 ? '+' : '') + '$' + fmt(pnl) : '--'}</td>
      <td class="${isOpen ? '' : isWin ? 'win' : 'loss'}">${pnlPct !== null ? (pnlPct > 0 ? '+' : '') + fmt(pnlPct) + '%' : '--'}</td>
      <td>${t.rr ? t.rr + 'R' : '--'}</td>
      <td style="color:var(--txt-2);font-size:0.67rem;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.setup || '--'}</td>
      <td style="color:var(--txt-2);font-size:0.67rem;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note || '--'}</td>
      <td><button class="btn btn-red btn-sm" onclick="deleteTrade('${t.id}')">×</button></td>
    </tr>`;
  }).join('');
}

function renderKPIs() {
  const s = calcStats(trades);
  $('kpi-total').textContent = s.total;
  $('kpi-wr').textContent = s.closed ? s.wr.toFixed(1) + '%' : '--%';
  $('kpi-wr').className = 'kpi-val ' + (s.wr >= 50 ? 'green' : 'red');
  $('kpi-pf').textContent = s.closed ? s.pf.toFixed(2) : '--';
  $('kpi-pf').className = 'kpi-val ' + (s.pf >= 1 ? 'green' : 'red');
  $('kpi-rr').textContent = s.closed ? s.rr.toFixed(2) + 'R' : '--';
  $('kpi-pnl').textContent = (s.pnl > 0 ? '+$' : '$') + fmt(s.pnl);
  $('kpi-pnl').className = 'kpi-val ' + (s.pnl >= 0 ? 'green' : 'red');
}

function renderAll() { renderKPIs(); renderTable(); drawEquity(trades); }

/* ── Export CSV ───────────────────────────────────────────── */
function exportCSV() {
  const headers = 'Fecha,Activo,Dirección,Entrada,Salida,Tamaño,P&L,P&L%,RR,Setup,Nota\n';
  const rows = trades.map(t => {
    const { pnl, pnlPct } = calcPnL(t);
    return [t.date, t.asset, t.direction, t.entry, t.exit||'', t.size,
      pnl !== null ? pnl.toFixed(2) : '', pnlPct !== null ? pnlPct.toFixed(2) : '',
      t.rr||'', t.setup||'', t.note||''].join(',');
  }).join('\n');
  const blob = new Blob([headers + rows], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sono-trades-' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

function clearFilters() {
  $('filter-dir').value = '';
  $('filter-result').value = '';
  renderTable();
}

/* ── Init ────────────────────────────────────────────────── */
$('f-date').value = new Date().toISOString().split('T')[0];
renderAll();

// Algunos trades demo si está vacío
if (!trades.length) {
  const demos = [
    { id:'d1', date:'2026-05-28', asset:'BTC', direction:'LONG', entry:68200, exit:70100, size:200, setup:'Score 68 · RSI 55', note:'Rompió resistencia', rr:'2.6' },
    { id:'d2', date:'2026-05-29', asset:'ETH', direction:'SHORT', entry:3820, exit:3760, size:150, setup:'Score 38 · ADX 30', note:'Rechazo resistencia', rr:'1.5' },
    { id:'d3', date:'2026-05-30', asset:'BTC', direction:'LONG', entry:71500, exit:null, size:300, setup:'Score 62 · Confluencia 75', note:'Abierto', rr:null },
  ];
  demos.forEach(d => trades.push(d));
  save(); renderAll();
}
</script>
</body>
</html>
