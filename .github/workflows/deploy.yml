name: Build + Deploy Sono Pro to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'indicador-sono-repo/sono-score-config.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Concurrency: si hay push mientras se deploya, cancela el anterior
concurrency:
  group: 'pages-deploy'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 🚀 Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ../indicador_cloudflare --project-name="indicador-sono"
