name: Actualizador Automatizado Método Sono 👒

on:
  schedule:
    # Se ejecuta cada 30 minutos (Formato Cron)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Permite ejecución manual desde el panel de GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clonar repositorio
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔑 Inyectar credenciales de Pionex
      run: |
        echo '{
          "api_key": "${{ secrets.PIONEX_API_KEY }}",
          "api_secret": "${{ secrets.PIONEX_API_SECRET }}"
        }' > indicador_btc/pionex_credentials.json

    - name: 📊 Ejecutar procesador de datos (Método Sono)
      working-directory: indicador_btc
      run: |
        python process_indicador_data.py

    - name: 🚀 Desplegar a Cloudflare Pages
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy indicador_cloudflare --project-name="indicador-sono"
