# ==============================================================================
#  CONFIGURACIÓN DE PROXY REVERSO: nginx.conf
#  PROPÓSITO: Configuración de Nginx para producción para la Web de Trading y OpenClaw.
#  RECOMENDACIÓN: Copie este bloque de servidor o agréguelo a su archivo nginx.conf de Linux/Windows.
# ==============================================================================

# Definición de límites de tasa de peticiones para mitigar ataques DoS / scraping abusivo de mercado
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name trading.ultrafino.com;
    
    # Redirección permanente HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trading.ultrafino.com;

    # Certificados SSL/TLS (Generados vía Certbot / Let's Encrypt o autofirmados para local)
    ssl_certificate /etc/letsencrypt/live/trading.ultrafino.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trading.ultrafino.com/privkey.pem;

    # Protocolos y Cifrados TLS recomendados por estándares modernos de SRE (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    
    # Parámetros de sesión SSL para optimizar la velocidad de conexión de reconexión de los clientes
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Encabezados de Seguridad Avanzada (Hardening)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval' wss:; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --------------------------------------------------------------------------
    # 1. FRONTEND: React / Next.js (Servidor en puerto 3000)
    # --------------------------------------------------------------------------
    location / {
        proxy_pass http://localhost:3000;
        
        # Encabezados Proxy Estándar
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Parámetros de tiempo de espera para el usuario
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # --------------------------------------------------------------------------
    # 2. API BACKEND REST: Node.js Express (Servidor en puerto 3002)
    # --------------------------------------------------------------------------
    location /api {
        proxy_pass http://localhost:3002;
        
        # Aplicación de límite de tráfico estricto para proteger endpoints sensibles
        limit_req zone=api_limit burst=20 nodelay;
        
        # Encabezados Proxy Estándar
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Deshabilitar almacenamiento en caché para respuestas dinámicas de la API de trading
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # --------------------------------------------------------------------------
    # 3. WEBSOCKET FEED: Actualizaciones de mercado y cuentas en vivo (Servidor en puerto 3001)
    # --------------------------------------------------------------------------
    location /ws {
        proxy_pass http://localhost:3001;
        
        # Forzar protocolo HTTP/1.1 requerido para WebSockets
        proxy_http_version 1.1;
        
        # Encabezados para negociar el Upgrade de la conexión TCP normal a WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Encabezados Proxy Estándar
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Evitar el cierre de la conexión TCP persistente por inactividad breve
        proxy_read_timeout 86400s; # 24 horas de persistencia
        proxy_send_timeout 86400s;
    }
}
