<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
  <!-- Definitions of styles and markers -->
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .grid { stroke: #1e293b; stroke-width: 1; opacity: 0.5; }
      .border { stroke: #334155; stroke-width: 2; fill: none; }
      .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 22px; font-weight: 800; fill: #f8fafc; }
      .subtitle { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: 500; fill: #94a3b8; }
      .box { rx: 8px; ry: 8px; stroke-width: 2; }
      .box-user { fill: #1e1b4b; stroke: #6366f1; }
      .box-front { fill: #0f172a; stroke: #0ea5e9; }
      .box-back { fill: #0f172a; stroke: #10b981; }
      .box-db { fill: #1c1917; stroke: #f59e0b; }
      .box-gateway { fill: #172554; stroke: #3b82f6; }
      .box-skill { fill: #111827; stroke: #8b5cf6; }
      .box-ext { fill: #022c22; stroke: #14b8a6; }
      .text-bold { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #f8fafc; }
      .text-normal { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #cbd5e1; }
      .text-dark { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #94a3b8; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 4,4; }
      .arrow-solid { stroke: #38bdf8; stroke-width: 2; fill: none; }
      .arrow-green { stroke: #34d399; stroke-width: 2; fill: none; }
      .arrow-purple { stroke: #c084fc; stroke-width: 2; fill: none; }
      .badge { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 700; fill: #0f172a; }
    </style>
    <!-- Arrow marker definition -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c084fc" />
    </marker>
  </defs>

  <!-- Background and grid pattern -->
  <rect width="1000" height="700" class="bg" />
  <g>
    <!-- Horizontal grid lines -->
    <line x1="0" y1="50" x2="1000" y2="50" class="grid" />
    <line x1="0" y1="100" x2="1000" y2="100" class="grid" />
    <line x1="0" y1="150" x2="1000" y2="150" class="grid" />
    <line x1="0" y1="200" x2="1000" y2="200" class="grid" />
    <line x1="0" y1="250" x2="1000" y2="250" class="grid" />
    <line x1="0" y1="300" x2="1000" y2="300" class="grid" />
    <line x1="0" y1="350" x2="1000" y2="350" class="grid" />
    <line x1="0" y1="400" x2="1000" y2="400" class="grid" />
    <line x1="0" y1="450" x2="1000" y2="450" class="grid" />
    <line x1="0" y1="500" x2="1000" y2="500" class="grid" />
    <line x1="0" y1="550" x2="1000" y2="550" class="grid" />
    <line x1="0" y1="600" x2="1000" y2="600" class="grid" />
    <line x1="0" y1="650" x2="1000" y2="650" class="grid" />
    <!-- Vertical grid lines -->
    <line x1="100" y1="0" x2="100" y2="700" class="grid" />
    <line x1="200" y1="0" x2="200" y2="700" class="grid" />
    <line x1="300" y1="0" x2="300" y2="700" class="grid" />
    <line x1="400" y1="0" x2="400" y2="700" class="grid" />
    <line x1="500" y1="0" x2="500" y2="700" class="grid" />
    <line x1="600" y1="0" x2="600" y2="700" class="grid" />
    <line x1="700" y1="0" x2="700" y2="700" class="grid" />
    <line x1="800" y1="0" x2="800" y2="700" class="grid" />
    <line x1="900" y1="0" x2="900" y2="700" class="grid" />
  </g>
  <rect x="2" y="2" width="996" height="696" class="border" />

  <!-- HEADER -->
  <text x="30" y="40" class="title">ARQUITECTURA DE DATOS E INFRAESTRUCTURA DE RED</text>
  <text x="30" y="60" class="subtitle">Ecosistema Integrado OpenClaw + Plataforma Web de Trading (Fino BTC / Sono)</text>

  <!-- USER (CLIENT ZONE) -->
  <g transform="translate(40, 100)">
    <rect width="180" height="110" class="box box-user" />
    <text x="15" y="25" class="text-bold">USUARIO FINAL / TRADER</text>
    <text x="15" y="50" class="text-normal">Webchat / App Móvil / PC</text>
    <text x="15" y="70" class="text-normal">Acción: Monitoreo y Trading</text>
    <text x="15" y="90" class="text-dark">Seguridad: HTTPS / JWT</text>
  </g>

  <!-- WEB TRADING FRONTEND -->
  <g transform="translate(300, 100)">
    <rect width="190" height="110" class="box box-front" />
    <text x="15" y="25" class="text-bold">TRADING FRONTEND UI</text>
    <text x="15" y="45" class="text-normal">React 18 / Next.js 14</text>
    <text x="15" y="65" class="text-normal">Puerto local: 3000</text>
    <text x="15" y="85" class="text-normal">Visualiza: TradingView Widget</text>
    <text x="15" y="100" class="text-dark">Cloudflare Pages / local</text>
  </g>

  <!-- WEB TRADING BACKEND (API & SOCKETS) -->
  <g transform="translate(560, 100)">
    <rect width="190" height="120" class="box box-back" />
    <text x="15" y="25" class="text-bold">TRADING BACKEND API</text>
    <text x="15" y="45" class="text-normal">Node.js Express / Python</text>
    <text x="15" y="65" class="text-normal">Puerto API REST: 3002</text>
    <text x="15" y="85" class="text-normal">Puerto WebSocket: 3001</text>
    <text x="15" y="105" class="text-dark">Maneja: JWT / Pionex API</text>
  </g>

  <!-- POSTGRESQL DATABASE -->
  <g transform="translate(800, 105)">
    <rect width="160" height="110" class="box box-db" />
    <text x="15" y="25" class="text-bold">POSTGRESQL DB</text>
    <text x="15" y="45" class="text-normal">Base: trading_db</text>
    <text x="15" y="65" class="text-normal">Puerto local: 5432</text>
    <text x="15" y="85" class="text-normal">Tablas: users, orders</text>
    <text x="15" y="100" class="text-dark">Seguridad: Host Restricted</text>
  </g>

  <!-- OPENCLAW GATEWAY -->
  <g transform="translate(300, 280)">
    <rect width="450" height="170" class="box box-gateway" />
    <text x="20" y="30" class="text-bold">OPENCLAW GATEWAY (LOCAL SERVING ENGINE)</text>
    <text x="20" y="55" class="text-normal">Plataforma: Node.js Execution Engine</text>
    <text x="20" y="75" class="text-normal">Puerto de red: 18789 (Enlazado estricto a loopback 127.0.0.1)</text>
    <text x="20" y="95" class="text-normal">Gestión de Contexto: contextTokens 200,000</text>
    <text x="20" y="115" class="text-normal">Seguridad: Token Authentication Mode</text>
    <text x="20" y="135" class="text-normal">Optimización: Heartbeat inhabilitado (HEARTBEAT.md inyectado)</text>
    <text x="20" y="155" class="text-dark">Lanzador: start-openclaw.bat (Manual Launcher, no Windows Service)</text>
  </g>

  <!-- ACTIVE MEMORY SYSTEM -->
  <g transform="translate(800, 280)">
    <rect width="160" height="115" class="box box-db" />
    <text x="15" y="25" class="text-bold">ACTIVE MEMORY</text>
    <text x="15" y="45" class="text-normal">Directorio de archivos</text>
    <text x="15" y="65" class="text-normal">Persistencia en disco</text>
    <text x="15" y="85" class="text-normal">MEMORY.md (Durable)</text>
    <text x="15" y="100" class="text-dark">Fidelidad: 100%</text>
  </g>

  <!-- SKILLS ARCHITECTURE -->
  <g transform="translate(300, 500)">
    <rect width="190" height="130" class="box box-skill" />
    <text x="15" y="25" class="text-bold">SKILL PORT</text>
    <text x="15" y="45" class="text-normal">perplexity-search</text>
    <text x="15" y="65" class="text-normal">Node.js + Playwright</text>
    <text x="15" y="85" class="text-normal">Engine: Chromium</text>
    <text x="15" y="105" class="text-normal">Evasión: Cookie Bypass</text>
    <text x="15" y="120" class="text-dark">Ruta: local-skills/</text>
  </g>

  <!-- GOOGLE GEMINI API (EXTERNAL) -->
  <g transform="translate(560, 500)">
    <rect width="190" height="110" class="box box-ext" />
    <text x="15" y="25" class="text-bold">GOOGLE GEMINI API</text>
    <text x="15" y="45" class="text-normal">Modelo: gemini-2.5-flash</text>
    <text x="15" y="65" class="text-normal">Canal: HTTPS encrypted</text>
    <text x="15" y="85" class="text-normal">Método: API Key Directa</text>
    <text x="15" y="100" class="text-dark">No google:manual profiling</text>
  </g>

  <!-- PERPLEXITY CLOUD / WEB INTERNET -->
  <g transform="translate(40, 510)">
    <rect width="180" height="100" class="box box-ext" />
    <text x="15" y="25" class="text-bold">EXT. SEARCH ENGINE</text>
    <text x="15" y="45" class="text-normal">perplexity.ai</text>
    <text x="15" y="65" class="text-normal">Protocolo: HTTP/HTTPS</text>
    <text x="15" y="85" class="text-normal">Bypass: anti-bot bypass</text>
  </g>

  <!-- FLOW ARROWS & DATA LABELS -->
  <!-- User to Frontend -->
  <path d="M 220,150 L 290,150" class="arrow-solid" marker-end="url(#arrowhead-blue)" />
  <text x="225" y="140" class="text-normal">1. HTTPS</text>

  <!-- Frontend to Backend -->
  <path d="M 490,140 L 550,140" class="arrow-solid" marker-end="url(#arrowhead-blue)" />
  <path d="M 550,170 L 490,170" class="arrow-solid" marker-end="url(#arrowhead-blue)" />
  <text x="495" y="130" class="text-normal">2. Sockets / REST</text>

  <!-- Backend to DB -->
  <path d="M 750,155 L 790,155" class="arrow-green" marker-end="url(#arrowhead-green)" />
  <text x="755" y="145" class="text-normal">TCP</text>

  <!-- Backend to OpenClaw -->
  <path d="M 640,220 L 640,270" class="arrow-purple" marker-end="url(#arrowhead-purple)" />
  <text x="645" y="245" class="text-normal">3. HTTP / Token</text>

  <!-- OpenClaw to Gemini -->
  <path d="M 610,450 L 610,490" class="arrow-green" marker-end="url(#arrowhead-green)" />
  <path d="M 650,490 L 650,450" class="arrow-green" marker-end="url(#arrowhead-green)" />
  <text x="565" y="475" class="text-normal">4. REST API</text>

  <!-- OpenClaw to Memory -->
  <path d="M 750,340 L 790,340" class="arrow-solid" marker-end="url(#arrowhead-blue)" />
  <text x="755" y="330" class="text-normal">I/O NTFS</text>

  <!-- OpenClaw to Skills -->
  <path d="M 400,450 L 400,490" class="arrow-purple" marker-end="url(#arrowhead-purple)" />
  <text x="405" y="475" class="text-normal">Spawn</text>

  <!-- Skills to Internet (Perplexity) -->
  <path d="M 300,565 L 230,565" class="arrow-purple" marker-end="url(#arrowhead-purple)" />
  <text x="235" y="555" class="text-normal">Playwright</text>

  <!-- Visual labels / indicators -->
  <rect x="310" y="420" width="105" height="18" rx="3" fill="#34d399" />
  <text x="315" y="433" class="badge">SECURED NETWORK</text>

  <rect x="570" y="190" width="100" height="18" rx="3" fill="#fbbf24" />
  <text x="575" y="203" class="badge">PIONEX live api</text>
</svg>
