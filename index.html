<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Inter",sans-serif;background:#0f172a;color:#f1f5f9;-webkit-font-smoothing:antialiased}
.ap{max-width:1100px;margin:0 auto;padding:.75rem 1rem}
.tp{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;margin-bottom:.75rem;flex-wrap:wrap;gap:8px}
.lg{font-size:15px;font-weight:700}.lg span{color:#3b82f6}
.nv{display:flex;gap:4px;flex-wrap:wrap}
.nv a{padding:6px 14px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:500;color:#94a3b8}
.nv a:hover,.nv a.ac{background:#1e293b;color:#f1f5f9}
.ab{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ab button{padding:6px 16px;border-radius:10px;border:.5px solid rgba(255,255,255,.06);background:#1e293b;color:#94a3b8;cursor:pointer;font-size:13px;font-weight:500}
.ab button:hover,.ab button.ac{background:rgba(59,130,246,.15);color:#3b82f6;border-color:rgba(59,130,246,.3)}
.db{display:flex;flex-direction:column;gap:12px;font-size:13px}
.gr{display:grid;gap:12px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.cd{background:#0f172a;border:.5px solid rgba(255,255,255,.06);border-radius:16px;padding:1rem 1.25rem}
.cs{background:#1e293b;border-radius:10px;padding:.75rem 1rem}
.lb{font-size:11px;color:#64748b;font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.vl{font-size:22px;font-weight:500;line-height:1}.vx{font-size:28px;font-weight:500;line-height:1}
.sb{font-size:12px;color:#94a3b8;margin-top:3px}
.pl{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500}
.pgg{background:rgba(34,197,94,.15);color:#22c55e}
.prr{background:rgba(239,68,68,.15);color:#ef4444}
.pw{background:rgba(245,158,11,.15);color:#f59e0b}
.pb{background:rgba(59,130,246,.15);color:#3b82f6}
.pgg2{background:#1e293b;color:#94a3b8}
.sp{border-top:.5px solid rgba(255,255,255,.06);margin:10px 0}
.sw{display:flex;align-items:center;gap:16px}
.srr{position:relative;width:80px;height:80px;flex-shrink:0}
.srr svg{width:80px;height:80px;transform:rotate(-90deg)}
.svv{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500}
.bt{height:6px;border-radius:999px;background:#1e293b;overflow:hidden;margin-top:6px}
.bf{height:100%;border-radius:999px;transition:width .4s}
.tfb{padding:4px 10px;border-radius:10px;border:.5px solid rgba(255,255,255,.06);background:#0f172a;color:#94a3b8;cursor:pointer;font-size:12px}
.tfb.ac{background:rgba(59,130,246,.15);color:#3b82f6;border-color:rgba(59,130,246,.3)}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mc{background:#1e293b;border-radius:10px;padding:.6rem .75rem;text-align:center}
.mt{font-size:10px;font-weight:500;color:#64748b;text-transform:uppercase}
.mv{font-size:22px;font-weight:600;margin-bottom:3px}
.ms{font-size:11px;color:#94a3b8}
.pt{height:8px;border-radius:999px;position:relative;background:linear-gradient(90deg,rgba(239,68,68,.3),#1e293b 50%,rgba(34,197,94,.3));margin:8px 0}
.pd{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:#3b82f6;border:2px solid rgba(59,130,246,.3);transform:translate(-50%,-50%);transition:left .3s}
.srr2{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid rgba(255,255,255,.06)}
.srr2:last-child{border-bottom:none}
.dt{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}.dg{background:#22c55e}.dr{background:#ef4444}.dn{background:#64748b}
.sg{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid rgba(255,255,255,.06)}.sg:last-child{border-bottom:none}
.si{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sy{background:rgba(34,197,94,.15);color:#22c55e}.sn{background:#1e293b;color:#64748b}
.rb{padding:6px 12px;border-radius:10px;font-size:13px;font-weight:500;display:inline-block}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.st{font-size:12px;font-weight:500;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.ri{font-size:11px;color:#64748b}
.ld{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px;animation:pp 2s infinite}
.sk{display:inline-block;background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);background-size:200% 100%;animation:sh 1.5s ease-in-out infinite;border-radius:6px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-bl{display:block;height:18px;width:60%;margin-bottom:4px}.sk-bs{height:14px;width:40%;display:block}.sk-bm{height:24px;width:80px;display:block}.sk-ss{height:80px;width:80px;border-radius:50%;display:block}
.st-bar{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:500;margin-bottom:8px;transition:all .3s}
.st-bar.co{background:rgba(59,130,246,.12);color:#3b82f6}.st-bar.ok{background:rgba(34,197,94,.12);color:#22c55e}.st-bar.er{background:rgba(239,68,68,.12);color:#ef4444}
.st-dot{width:6px;height:6px;border-radius:50%;display:inline-block;animation:pp 1.5s infinite}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes sh{0%{opacity:.3}50%{opacity:.7}100%{opacity:.3}}
.skeleton{background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:6px;display:inline-block;min-height:1em;min-width:80px}
@media(max-width:768px){.g2,.g3,.g4,.mg{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.g2,.g3,.g4,.mg{grid-template-columns:1fr}}
