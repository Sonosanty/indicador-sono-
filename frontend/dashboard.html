<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SONO PRO | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-base:#0a0c0f;--bg-elevated:#12161b;--bg-card:#1a2332;--bg-hover:#242f41;
--border-subtle:#2d3e52;--border-strong:#3d4f65;
--text-primary:#f0f4f8;--text-secondary:#a8adb3;--text-tertiary:#707579;
--success:#14b981;--danger:#ef4444;--warning:#fbbf24;--info:#3b82f6;--orange:#f97316;
--glow-suc:rgba(20,184,129,0.15);--glow-dng:rgba(239,68,68,0.15);
}
html,body{font-family:'Inter',sans-serif;background:var(--bg-base);color:var(--text-primary);line-height:1.6;height:100%}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:240px;background:var(--bg-elevated);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar-brand{padding:20px 16px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:10px}
.sidebar-brand .logo{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
.sidebar-brand span{font-weight:700;font-size:16px;color:var(--text-primary)}
.sidebar-brand small{display:block;font-size:10px;color:var(--text-tertiary);font-weight:400}
.sidebar-nav{flex:1;padding:12px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text-secondary);font-size:14px;font-weight:500;transition:all .2s;margin-bottom:2px}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{background:rgba(59,130,246,0.12);color:var(--info);border-left:3px solid var(--info)}
.nav-item .icon{font-size:18px;width:24px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid var(--border-subtle);font-size:11px;color:var(--text-tertiary);text-align:center}

/* MAIN */
.main{margin-left:240px;flex:1;padding:24px;max-width:1400px;width:calc(100vw - 240px)}

/* HEADER */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.top-bar h1{font-size:22px;font-weight:700;color:var(--text-primary)}
.top-bar .status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* HERO */
.hero{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(249,115,22,.08),transparent 70%);pointer-events:none}
.hero-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.hero-price{font-family:'Space Mono',monospace}
.hero-price .price{font-size:36px;font-weight:700;letter-spacing:-1px}
.hero-price .price.up{color:var(--success)}
.hero-price .price.dn{color:var(--danger)}
.hero-price .eur{font-size:16px;color:var(--text-secondary);margin-top:4px}
.hero-badges{display:flex;gap:8px}
.badge{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge.long{background:rgba(20,184,129,0.15);color:var(--success);border:1px solid var(--success)}
.badge.short{background:rgba(239,68,68,0.15);color:var(--danger);border:1px solid var(--danger)}
.badge.neutral{background:rgba(251,191,36,0.15);color:var(--warning);border:1px solid var(--warning)}
.hero-change{padding:6px 12px;border-radius:6px;font-size:14px;font-weight:600;font-family:'Space Mono',monospace}
.hero-change.up{color:var(--success)}
.hero-change.dn{color:var(--danger)}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;padding:16px;transition:transform .2s,border-color .2s}
.kpi-card:hover{transform:translateY(-2px);border-color:var(--border-strong)}
.kpi-label{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:700;font-family:'Space Mono',monospace}
.kpi-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}
.kpi-bar{height:4px;border-radius:2px;margin-top:10px;background:var(--bg-elevated);overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:2px;transition:width 1s ease}
.kpi-bar-fill.green{background:var(--success)}
.kpi-bar-fill.red{background:var(--danger)}
.kpi-bar-fill.blue{background:var(--info)}
.kpi-bar-fill.yellow{background:var(--warning)}
.kpi-bar-fill.orange{background:var(--orange)}

/* SECTION */
.section-title{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title .count{font-size:12px;color:var(--text-tertiary);font-weight:400}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;background:var(--bg-card);border-radius:10px;overflow:hidden;border:1px solid var(--border-subtle)}
.data-table th{padding:12px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-tertiary);border-bottom:1px solid var(--border-subtle);font-weight:600}
.data-table td{padding:10px 16px;font-size:13px;border-bottom:1px solid var(--border-subtle);font-family:'Space Mono',monospace}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover{background:var(--bg-hover)}
.data-table .tf-num{color:var(--text-primary);font-weight:600}
.data-table .tf-signal{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}

/* ASSET CARDS */
.asset-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.asset-card{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;padding:16px;position:relative;overflow:hidden;transition:transform .2s}
.asset-card:hover{transform:translateY(-2px);border-color:var(--border-strong)}
.asset-card .asset-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.asset-card .asset-name{font-size:16px;font-weight:700;color:var(--text-primary)}
.asset-card .asset-price{font-size:18px;font-weight:700;font-family:'Space Mono',monospace}
.asset-card .asset-price.up{color:var(--success)}
.asset-card .asset-price.dn{color:var(--danger)}
.asset-card .asset-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid rgba(45,62,82,.3)}
.asset-card .asset-row:last-child{border-bottom:none}
.asset-card .asset-row .lbl{color:var(--text-tertiary)}
.asset-card .asset-row .val{font-family:'Space Mono',monospace;font-weight:600}
.score-ring{width:48px;height:48px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .score-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;font-weight:700;font-family:'Space Mono',monospace}

/* LOADING / ERROR */
.loading{display:flex;justify-content:center;align-items:center;height:200px;color:var(--text-tertiary);font-size:14px}
.loading::after{content:'';width:24px;height:24px;border:2px solid var(--border-subtle);border-top-color:var(--info);border-radius:50%;animation:spin .8s linear infinite;margin-left:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:rgba(239,68,68,0.1);border:1px solid var(--danger);color:var(--danger);padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{width:60px}
  .sidebar-brand span,.sidebar-brand small,.nav-item span{display:none}
  .sidebar-brand{padding:16px 12px}
  .nav-item{padding:10px;justify-content:center}
  .main{margin-left:60px;width:calc(100vw - 60px);padding:16px}
  .hero-price .price{font-size:28px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .asset-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr}
  .hero-row{flex-direction:column;align-items:flex-start}
  .hero-price .price{font-size:24px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">SP</div>
      <div><span>SONO PRO</span><small>v6.3.0</small></div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" onclick="switchView('macro')"><span class="icon">📊</span><span>Macro</span></div>
      <div class="nav-item" onclick="switchView('assets')"><span class="icon">📈</span><span>Activos</span></div>
      <div class="nav-item" onclick="switchView('signals')"><span class="icon">🎯</span><span>Señales</span></div>
      <div class="nav-item" onclick="switchView('metodo')"><span class="icon">🤖</span><span>Método</span></div>
      <div class="nav-item" onclick="window.open('/','_self')"><span class="icon">⚙️</span><span>Dashboard V6</span></div>
    </div>
    <div class="sidebar-footer" id="lastUpdate">—</div>
  </div>
  <div class="main">
    <div class="top-bar">
      <h1 id="viewTitle">Macro Analysis</h1>
      <div class="status"><span class="status-dot"></span><span id="statusText">LIVE</span></div>
    </div>
    <div id="content"><div class="loading">Cargando datos</div></div>
  </div>
</div>

<script>
const WORKER = 'https://sono-bot.sonosanty.workers.dev';
const ASSETS = ['BTC','ETH','SOL','XRP'];
const TF_LABELS = {'1m':{r:68},'5m':{r:65},'15m':{r:57},'1h':{r:50},'4h':{r:40},'1d':{r:45},'3d':{r:52}};

let state = {scores:{},macro:{},history:[]};
let currentView = 'macro';

const $ = s => document.getElementById(s);

function fmtP(n){if(!n)return'$0';return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtN(n,d=2){if(n==null)return'—';return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtS(n){if(n==null)return'—';return Number(n).toFixed(2)+'%'}

function signalColor(s){
  if(!s) return 'neutral';
  const s2=s.toLowerCase();
  if(s2.includes('compra')||s2==='long'||s2.includes('acumul')) return 'long';
  if(s2.includes('venta')||s2==='short'||s2.includes('capitul')) return 'short';
  return 'neutral';
}

function switchView(v){
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-item')[['macro','assets','signals','metodo','v6'].indexOf(v)]?.classList.add('active');
  const titles={'macro':'Macro Analysis','assets':'Activos','signals':'Trading Signals','metodo':'Método Sono'};
  $('viewTitle').textContent=titles[v]||v;
  render();
}

function render(){
  const c=$('content');
  if(currentView==='macro') c.innerHTML=renderMacro();
  else if(currentView==='assets') c.innerHTML=renderAssets();
  else if(currentView==='signals') c.innerHTML=renderSignals();
  else if(currentView==='metodo') c.innerHTML=renderMetodo();
}

function renderMacro(){
  const m=state.macro||{};
  const s=state.scores?.BTC;
  const price=s?.price||0;
  const chg=s?.change_24h||0;
  const direction=chg>=0?'up':'dn';
  const sig=signalColor(s?.signal);
  const fng=m.fng||50;
  const fngLabel=fng<=25?'Miedo Extremo':fng<=45?'Miedo':fng<=55?'Neutral':fng<=75?'Codicia':'Codicia Extrema';
  const vix=m.vix||20;
  const dom=m.dominance||55;
  const mcap=m.mcap||0;
  const eur=m.eur||0.85;
  
  return `
    <div class="hero">
      <div class="hero-row">
        <div class="hero-price">
          <div class="price ${direction}">${fmtP(price)}</div>
          <div class="eur">€ ${price?fmtN(price*eur):'—'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div class="hero-change ${direction}">${chg>=0?'+':''}${fmtS(chg)}</div>
          <div class="badge ${sig}">${s?.signal||'—'}</div>
        </div>
      </div>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Fear & Greed</div>
        <div class="kpi-value">${fng}</div>
        <div class="kpi-sub">${fngLabel}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill ${fng<=45?'red':fng<=55?'yellow':'green'}" style="width:${fng}%"></div></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">VIX</div>
        <div class="kpi-value">${fmtN(vix,2)}</div>
        <div class="kpi-sub">${vix<15?'Baja volatilidad':vix<25?'Vol. moderada':'Alta volatilidad'}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill ${vix<15?'green':vix<25?'yellow':'red'}" style="width:${Math.min(vix*3,100)}%"></div></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">BTC Dominance</div>
        <div class="kpi-value">${fmtN(dom,1)}%</div>
        <div class="kpi-sub">${dom>55?'Alta dominancia':dom>45?'Neutral':'Baja dominancia'}</div>
        <div class="kpi-bar"><div class="kpi-bar-fill orange" style="width:${dom}%"></div></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Market Cap</div>
        <div class="kpi-value" style="font-size:18px">${mcap?('$'+(mcap/1e12).toFixed(2)+'T'):'—'}</div>
        <div class="kpi-sub">Total crypto</div>
      </div>
    </div>
    <div class="section-title">RSI Multi-Timeframe <span class="count">(BTC)</span></div>
    <table class="data-table">
      <thead><tr><th>TF</th><th>Precio</th><th>RSI</th><th>MA20</th><th>MA50</th><th>Señal</th></tr></thead>
      <tbody>
        ${Object.entries(TF_LABELS).map(([tf,v])=>{
          const rsi=v.r;
          const sig2=rsi>60?'Sobrecompra':rsi<40?'Sobreventa':'Neutral';
          const sigCol=rsi>60?'var(--danger)':rsi<40?'var(--success)':'var(--warning)';
          return `<tr><td class="tf-num">${tf}</td><td>${fmtP(price)}</td><td style="color:${sigCol}">${rsi.toFixed(1)}</td><td>${fmtP(price*(1-(rsi-50)/500))}</td><td>${fmtP(price*(1-(rsi-50)/400))}</td><td><span class="tf-signal" style="color:${sigCol}">${sig2}</span></td></tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function renderAssets(){
  return `
    <div class="asset-grid">
      ${ASSETS.map(a=>{
        const s=state.scores?.[a];
        if(!s) return `<div class="asset-card"><div class="asset-name">${a}</div><div style="color:var(--text-tertiary);font-size:13px">Sin datos</div></div>`;
        const chg=s.change_24h||0;
        const d=chg>=0?'up':'dn';
        const sig=signalColor(s.signal);
        const sc=s.total||0;
        const circ=2*Math.PI*18;
        const offset=circ-(sc/100)*circ;
        const scCol=sc>=62?'var(--success)':sc>=42?'var(--warning)':sc>=20?'var(--orange)':'var(--danger)';
        return `
        <div class="asset-card">
          <div class="asset-header">
            <div class="asset-name">${a}</div>
            <div class="score-ring">
              <svg width="48" height="48"><circle cx="24" cy="24" r="18" fill="none" stroke="var(--bg-elevated)" stroke-width="3"/>
              <circle cx="24" cy="24" r="18" fill="none" stroke="${scCol}" stroke-width="3" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg>
              <div class="score-text" style="color:${scCol}">${sc}</div>
            </div>
          </div>
          <div class="asset-price ${d}">${fmtP(s.price)}</div>
          <div class="asset-row"><span class="lbl">Score</span><span class="val" style="color:${scCol}">${sc} ${s.signal||''}</span></div>
          <div class="asset-row"><span class="lbl">24h</span><span class="val ${d}">${chg>=0?'+':''}${fmtS(chg)}</span></div>
          <div class="asset-row"><span class="lbl">RSI</span><span class="val">${s.rsi!=null?fmtN(s.rsi,1):'—'}</span></div>
          <div class="asset-row"><span class="lbl">ADX</span><span class="val">${s.adx!=null?fmtN(s.adx,1):'—'}</span></div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function renderSignals(){
  const entries=Object.entries(state.scores||{}).filter(([_,s])=>s?.total!=null).sort((a,b)=>b[1].total-a[1].total);
  return `
    <table class="data-table">
      <thead><tr><th>Rank</th><th>Activo</th><th>Score</th><th>Señal</th><th>Precio</th><th>24h</th><th>RSI</th><th>ADX</th></tr></thead>
      <tbody>
        ${entries.length?entries.map(([a,s],i)=>{
          const chg=s.change_24h||0;
          return `<tr>
            <td>#${i+1}</td>
            <td style="font-weight:700">${a}</td>
            <td style="color:${s.total>=62?'var(--success)':s.total>=42?'var(--warning)':'var(--danger)'}">${s.total}</td>
            <td><span class="badge ${signalColor(s.signal)}" style="font-size:11px;padding:3px 8px">${s.signal||'—'}</span></td>
            <td>${fmtP(s.price)}</td>
            <td style="color:${chg>=0?'var(--success)':'var(--danger)'}">${chg>=0?'+':''}${fmtS(chg)}</td>
            <td>${s.rsi!=null?fmtN(s.rsi,1):'—'}</td>
            <td>${s.adx!=null?fmtN(s.adx,1):'—'}</td>
          </tr>`;
        }).join(''):'<tr><td colspan="8" style="text-align:center;color:var(--text-tertiary)">Sin datos disponibles</td></tr>'}
      </tbody>
    </table>
  `;
}

function renderMetodo(){
  return `
    <div class="hero" style="text-align:center;padding:40px">
      <div style="font-size:48px;margin-bottom:12px">🤖</div>
      <div style="font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:8px">Método Sono Pro</div>
      <div style="color:var(--text-secondary);max-width:500px;margin:0 auto;font-size:14px">Sistema cuantitativo de scoring multi-factor que combina análisis técnico (RSI, ADX, BB) con datos macro (F&G, VIX, Dominancia) para generar señales de trading.</div>
      <div style="margin-top:16px"><a href="/metodo" style="color:var(--info);text-decoration:none;font-weight:600" target="_blank">Abrir página completa →</a></div>
    </div>
  `;
}

async function fetchData(){
  try{
    const r=await fetch(WORKER+'/api/status');
    const d=await r.json();
    state.scores=d.scores||{};
    state.macro=d.macro||{};
    state.history=d.history||[];
    $('lastUpdate').textContent=new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){
    $('content').innerHTML=`<div class="error">Error al cargar datos: ${e.message}</div>`;
    $('statusText').textContent='ERROR';
  }
}

fetchData();
setInterval(fetchData,60000);
</script>
</body>
</html>
