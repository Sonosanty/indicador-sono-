<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Metodo Sono - v3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--ink:#0a0d12;--ink2:#111520;--ink3:#161c27;--ink4:#1d2535;--ink5:#242e41;--wire:#fff0d;--wire2:#fff18;--wire3:#fff28;--go:#00d68f;--go-glow:rgba(0,214,143,.18);--stop:#ff4757;--stop-glow:rgba(255,71,87,.15);--caution:#ffb800;--info:#4da6ff;--purple:#9b6dff;--txt:#dde4f0;--txt2:#8795aa;--txt3:#4f5e72;--mono:"Space Mono",monospace;--head:"Syne",sans-serif}
body{background:var(--ink);color:var(--txt);font-family:var(--mono);font-size:13px;min-height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--ink2);border-bottom:1px solid var(--wire2);position:sticky;top:0;z-index:200}
.price-bar{display:flex;gap:6px;padding:8px 20px;background:var(--ink2);border-bottom:1px solid var(--wire2)}
.pb{display:flex;align-items:center;gap:7px;padding:6px 14px;background:var(--ink3);border:1px solid var(--wire2);border-radius:6px;cursor:pointer;flex:1;justify-content:center}
.pb.sel{border-color:rgba(0,214,143,.35)}.wrap{padding:20px 28px;max-width:1680px;margin:0 auto}
.two-col{display:grid;grid-template-columns:1fr 294px;gap:10px;margin-bottom:20px}
.chart-box{background:var(--ink2);border:1px solid var(--wire2);border-radius:10px;padding:16px}
.score-big{font-size:72px;font-weight:800;background:linear-gradient(135deg,var(--go),var(--info));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mgrid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:20px}
.sgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.foot{text-align:center;padding:20px;font-size:9px;color:var(--txt3)}</style></head>
<body>
<div class="topbar"><div class="logo-badge">📋</div><div class="logo-name">Método</div><div class="spacer"></div><div class="live-chip"><div class="pulse"></div>SONO PRO · v3</div></div>

<div class="wrap" id="app"></div>
<div class="modal-bg" id="modalBg" onclick="closeDrawer(event)"><div class="drawer"><div class="drawer-head"><div class="drawer-title" id="drawerTitle">—</div><button class="drawer-close" onclick="closeDrawer()">✕</button></div><div class="drawer-body" id="drawerBody"></div><div class="drawer-kpis" id="drawerKpis"></div></div></div>
<div class="foot">Fino Edition 👒 · Sono PRO Terminal v3 · <span id="ts">--:--:--</span></div>
<script>var A={BTC:{s:"BTCUSDT",d:2},ETH:{s:"ETHUSDT",d:2},SOL:{s:"SOLUSDT",d:3},XRP:{s:"XRPUSDT",d:4}},K=["BTC","ETH","SOL","XRP"],TF=["1m","5m","1h","4h","1d"];
var cc="BTC",cp=null,ct="1h",ch=null,pr={},fng=null,fngl=null;
function $(i){return document.getElementById(i);}
function f(n,d){if(n==null||isNaN(n))return"---";return Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});}
function av(a){if(!a||!a.length)return null;var s=0;for(var i=0;i<a.length;i++)s+=a[i];return s/a.length;}
function sm(a,l){var r=[];for(var i=0;i<a.length;i++){if(i<l-1){r.push(null);continue;}var s=0;for(var j=i-l+1;j<=i;j++)s+=a[j];r.push(+(s/l).toFixed(2));}return r;}
function bb(a,l,m){if(a.length<l)return{up:[],mid:[],lo:[]};var md=sm(a,l),up=[],lo=[];for(var i=0;i<a.length;i++){if(i<l-1){up.push(null);lo.push(null);continue;}var sl=a.slice(i-l+1,i+1),mn=av(sl),sd=Math.sqrt(sl.reduce(function(s,v){return s+(v-mn)*(v-mn)},0)/l);up.push(+(mn+m*sd).toFixed(2));lo.push(+(mn-m*sd).toFixed(2));}return{up:up,mid:md,lo:lo};}
function fb(k){return fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+A[k].s,{signal:AbortSignal.timeout(5000)}).then(function(r){return r.json();}).then(function(d){return{price:+d.lastPrice,chg:+d.priceChangePercent};}).catch(function(){return null;});}
function fk(k,t,l){return fetch("https://api.binance.com/api/v3/klines?symbol="+A[k].s+"&interval="+t+"&limit="+l,{signal:AbortSignal.timeout(7000)}).then(function(r){return r.json();}).then(function(d){if(!d||!d.length)return null;return d.map(function(x){return{t:x[0],c:+x[4]};});}).catch(function(){return null;});}
function uPB(){K.forEach(function(k){fb(k).then(function(d){if(!d)return;pr[k]=d;if(k===cc)cp=d.price;var el=$(k+"pr");if(el)el.textContent="$"+f(d.price,A[k].d);});});}
function bCh(c,t){var lm=t==="4h"||t==="1d"?30:48;fk(c,t,lm).then(function(kl){if(!kl||kl.length<3){if(ch){ch.destroy();ch=null;}return;}
var pa=kl.map(function(x){return x.c;}),ti=kl.map(function(x){var d=new Date(x.t);return t==="1d"?d.toLocaleDateString("es",{day:"2-digit",month:"short"}):(d.getHours()+"").padStart(2,"0")+":"+(d.getMinutes()+"").padStart(2,"0");});
var m6=sm(pa,Math.min(6,pa.length)),m70=sm(pa,Math.min(70,pa.length));
var bbd=bb(pa,20,2),lp=pa[pa.length-1],lbbup=bbd.up[bbd.up.length-1],lbblo=bbd.lo[bbd.lo.length-1],bz="NEUTRO";
if(lp!=null&&lbbup!=null&&lbblo!=null){if(lp>=lbbup)bz="SUPERIOR";else if(lp<=lbblo)bz="INFERIOR";}
var ctx=$("mainChart").getContext("2d");if(ch){ch.destroy();}
ch=new Chart(ctx,{type:"line",data:{labels:ti,datasets:[{label:"Precio",data:pa,borderColor:"#4da6ff",borderWidth:1.5,pointRadius:0,tension:.35,fill:false},{label:"MA6",data:m6,borderColor:"#00d68f",borderWidth:1.5,pointRadius:0,tension:.35,fill:false},{label:"MA70",data:m70,borderColor:"#ffb800",borderWidth:1.5,pointRadius:0,tension:.35,fill:false,borderDash:[5,4]}]},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#1d2535",borderColor:"rgba(255,255,255,.16)",borderWidth:1,titleColor:"#8795aa",bodyColor:"#dde4f0",callbacks:{label:function(ctx){return ctx.dataset.label+": $"+f(ctx.raw,2);}}}},
scales:{x:{ticks:{color:"#4f5e72",font:{size:10}},grid:{color:"rgba(255,255,255,.04)"}},y:{ticks:{color:"#4f5e72",font:{size:10}},grid:{color:"rgba(255,255,255,.04)"}}}}});window._bz=bz;window._m6=m6[m6.length-1];window._m70=m70[m70.length-1];});}
function uS(){if(!cp)return;var e=cp,m6=window._m6,m70=window._m70,bz=window._bz||"NEUTRO",ma="NEUTRO";if(m6!=null&&m70!=null)ma=m6>m70?"LONG":"SHORT";
var dc="NEUTRO";if(ma==="LONG"||bz==="INFERIOR")dc="LONG";if(ma==="SHORT"||bz==="SUPERIOR")dc="SHORT";var sb=$("signalsBox");if(!sb)return;
sb.innerHTML='<div class="sigs-hd">Se\u00f1ales activas</div><div class="sig"><span class="sig-n">MA6 \u00d7 MA70</span><span class="sig-v '+(ma==="LONG"?"sv-go":ma==="SHORT"?"sv-stop":"sv-warn")+'">'+ma+(m6!=null&&m70!=null?" ("+(m6>m70?"\u2191":"\u2193")+")":"")+'</span></div>'
+'<div class="sig"><span class="sig-n">Bollinger</span><span class="sig-v '+(bz==="INFERIOR"?"sv-go":bz==="SUPERIOR"?"sv-stop":"sv-warn")+'">'+bz+'</span></div>'
+'<div class="sig"><span class="sig-n">Fear &amp; Greed</span><span class="sig-v '+(fng!=null&&fng>50?"sv-go":"sv-warn")+'">'+(fng!=null?fng+" \u2014 "+fngl:"---")+'</span></div>'
+'<div class="sig"><span class="sig-n">Decisi\u00f3n</span><span class="sig-v '+(dc==="LONG"?"sv-go":"sv-stop")+'" style="font-size:12px">'+dc+" "+(dc==="LONG"?"\u2713":"\u2717")+'</span></div>'
+'<div class="sig"><span class="sig-n">Stop loss</span><span class="sig-v sv-stop">$'+f(e*0.98,2)+'</span></div>'
+'<div class="sig"><span class="sig-n">Target +4%</span><span class="sig-v sv-go">$'+f(e*1.04,2)+'</span></div>';}
function oD(k){var d=DD[k];if(!d)return;$("drawerTitle").textContent=d.t;$("drawerBody").innerHTML=d.b;$("drawerKpis").innerHTML=d.k.map(function(x){return'<div class="kpi"><div class="kpi-l">'+x.l+'</div><div class="kpi-v'+(x.c?" "+x.c:"")+'">'+x.v+'</div></div>';}).join("");$("modalBg").classList.add("open");document.body.style.overflow="hidden";}
function cD(e){if(e&&e.target!==$("modalBg"))return;$("modalBg").classList.remove("open");document.body.style.overflow="";}document.addEventListener("keydown",function(e){if(e.key==="Escape")cD();});
function sC(c){cc=c;if(pr[c])cp=pr[c].price;document.querySelectorAll(".pb").forEach(function(e){e.classList.remove("sel");});var pb=$("pb"+c);if(pb)pb.classList.add("sel");$("chartLbl").textContent=c+"/USDT — MA6 · MA70 · Precio";bCh(c,ct);uS();}
function sTF(b,t){ct=t;document.querySelectorAll(".tf").forEach(function(x){x.classList.remove("on");});if(b)b.classList.add("on");bCh(cc,ct);}
var DD={f:{t:"Filosofia Sono",b:"<strong>El trading es un marat\u00f3n, no un sprint.</strong><br><br>Disciplina absoluta, paciencia y humildad.",k:[{l:"Pilar",v:"Disciplina"},{l:"Horizonte",v:"Intrad\u00eda"},{l:"Clave",v:"Paciencia"},{l:"Error #1",v:"Revenge trade",c:"kv-stop"}]},
m:{t:"10 Mandamientos",b:"<strong>10 reglas:</strong><br><br>1. Stop loss siempre<br>2. Sin overnight<br>3. Sin revenge<br>4. Sin FOMO<br>5. Riesgo m\u00e1x 2%<br>6. Plan<br>7. Analizar<br>8. Aceptar fallos<br>9. Journal<br>10. Desconectar",k:[{l:"Reglas",v:"10"},{l:"Excepci\u00f3n",v:"Ninguna",c:"kv-stop"},{l:"Riesgo",v:"M\u00e1x 2%"},{l:"Overnight",v:"NO",c:"kv-stop"}]},
c:{t:"Gesti\u00f3n Capital",b:"<strong>Stops en cascada:</strong><br><br>-2% por trade<br>-3% diario: PARAR<br>-8% semanal: PARAR<br>-15% mensual: revisar",k:[{l:"Trade",v:"-2%",c:"kv-stop"},{l:"Diario",v:"-3%",c:"kv-stop"},{l:"Semanal",v:"-8%",c:"kv-stop"},{l:"Mensual",v:"-15%",c:"kv-stop"}]},
e:{t:"8 Estrategias",b:"<strong>Tres pilares:</strong><br><br>Gaps, MA6\u00d7MA70 y BB. 8 combinaciones. No excluyentes.",k:[{l:"Pilar 1",v:"Gaps"},{l:"Pilar 2",v:"MA6\u00d7MA70"},{l:"Pilar 3",v:"BB"},{l:"Total",v:"8",c:"kv-go"}]},
a:{t:"Adaptaci\u00f3n Cripto",b:"<strong>Ajram adaptado a cripto 24/7:</strong><br><br>BTC/ETH/SOL/XRP<br>Sin overnight<br>Score Sono<br>F&G filtro",k:[{l:"Activos",v:"BTC ETH SOL XRP"},{l:"Horario",v:"9h-23h"},{l:"Exchange",v:"Binance"},{l:"Entrada",v:"\u226562",c:"kv-go"}]},
r:{t:"Objetivos",b:"<strong>Paper \u2192 Real:</strong><br><br>30 ops<br>Winrate>55%<br>PF>1.5<br>DD<15%<br>R:R 1:2",k:[{l:"Win Rate",v:">55%",c:"kv-go"},{l:"PF",v:">1.5",c:"kv-go"},{l:"R:R",v:"1:2"},{l:"ROI",v:"+30-50%",c:"kv-go"}]},
b:{t:"Gesti\u00f3n Salida",b:"<strong>Trailing MA6:</strong><br><br>Precio>MA6: mantener<br>Precio<MA6: CERRAR<br>50% +2%, 50% trailing<br>Cierre 22:55h",k:[{l:"M\u00e9todo",v:"Trailing"},{l:"Target",v:"+4%",c:"kv-go"},{l:"Stop",v:"-2%",c:"kv-stop"},{l:"Cierre",v:"22:55h"}]},
g:{t:"Reglas de Oro",b:"<strong>8 reglas:</strong><br><br>1-3 trades<br>Stop loss siempre<br>Journal<br>Sin overnight<br>Sin noticias macro<br>Paper 30d<br>Winrate>55%<br>-3%=parar",k:[{l:"Trades",v:"1-3"},{l:"Journal",v:"S\u00ed"},{l:"Overnight",v:"NO",c:"kv-stop"},{l:"Paper",v:"30d",c:"kv-go"}]}};
function r(){$("priceBar").innerHTML=K.map(function(k){return'<div class="pb'+(k==="BTC"?' sel':'')+'" id="pb'+k+'" onclick="sC(\''+k+'\')"><span class="pb-sym">'+k+'</span><span class="pb-price" id="'+k+'pr">$--</span></div>';}).join("");
$("app").innerHTML='<div class="two-col"><div class="chart-box"><div class="chart-top"><div class="chart-lbl" id="chartLbl">BTC/USDT — MA6 · MA70 · Precio</div><div class="tf-row">'+TF.map(function(t,i){return'<button class="tf'+(i===2?' on':'')+'" onclick="sTF(this,\''+t+'\')">'+t+'</button>';}).join('')+'</div></div><div class="legend"><div class="leg-item"><div class="leg-line" style="background:#4da6ff"></div>Precio</div><div class="leg-item"><div class="leg-line" style="background:#00d68f"></div>MA6</div><div class="leg-item"><div class="leg-line" style="background:#ffb800;border-top:2px dashed #ffb800;height:0"></div>MA70</div></div><div class="chart-wrap"><canvas id="mainChart"></canvas></div></div><div class="right-col"><div class="score-box"><div class="score-row1"><div class="score-tag-lbl">Score Maestro Sono</div><div class="score-chip" style="background:rgba(0,214,143,.18);color:#00d68f">ACUMULACION</div></div><div class="score-big">62</div><div class="score-sub">P1 + P2 + P3 · Entrar >= 62</div><div class="pbar-bg"><div style="height:100%;width:62%;border-radius:3px;background:linear-gradient(90deg,#00d68f,#4da6ff);transition:width .9s"></div></div><div class="pbar-zones"><span>Panico</span><span>Miedo</span><span>Neutral</span><span>Euforia</span></div></div><div class="sigs-box" id="signalsBox"><div class="sigs-hd">Senales activas</div></div></div></div><div class="sh"><div class="sh-dot"></div><span>Modulos del Metodo</span><div class="sh-line"></div></div><div class="mgrid-2">'+["f","m","c","e","a","r","b","g"].map(function(k,i){var ic=["🧠","📜","🛡️","⚡","🌐","📈","🏁","👑"][i];var nm=["Filosofia","10 Mandamientos","Gestion Capital","8 Estrategias","Adaptacion Cripto","Objetivos","Gestion Salida","Reglas de Oro"][i];var pl=["Mental","Reglas","Riesgo","Tecnico","24/7","Meta","Trailing","Oro"][i];var pc=["#00d68f","#4da6ff","#ff4757","#9b6dff","#00d68f","#00d68f","#ffb800","#ffb800"][i];var ds=["Disciplina absoluta, paciencia y humildad.","Stop obligatorio. Sin overnight. Sin revenge.","-2% por trade, -3% diario, -8% semanal.","Gaps, MA6xMA70 y BB combinados.","BTC/ETH/SOL/XRP. Sin overnight.","Winrate>55%, PF>1.5, DD<15%.","Trailing con MA6. Parcial +2%.","1-3 trades/dia. Journal. Stop obligatorio."][i];return'<div class="mc" onclick="oD(\''+k+'\')"><div class="mc-ico">'+ic+'</div><div class="mc-name">'+nm+'</div><div class="mc-pill" style="background:'+pc+';opacity:.15;color:'+pc+'">'+pl+'</div><div class="mc-desc">'+ds+'</div></div>';}).join('')+'</div><div class="sh"><div class="sh-dot"></div><span>8 Estrategias</span><div class="sh-line"></div></div><div class="sgrid">'+["Gap UP","Gap DOWN","Cruce MA6xMA70","Cruce MA70xMA6","BB Compresion","BB Oversold","BB Overbought","Gap+BB+Cruce"].map(function(n,i){var d=["Gap alcista. LONG si no se cierra en 15m.","Gap bajista. SHORT si no se cubre.","MA6 cruza MA70 al alza. LONG.","MA6 cruza MA70 a la baja. SHORT.","Bandas estrechas. Explosion inminente.","BB inferior + RSI<30. LONG.","BB superior + RSI>70. SHORT.","Confluencia total. Alta probabilidad."][i];var p=["#00d68f","#ff4757","#4da6ff","#ff4757","#ffb800","#00d68f","#ff4757","#9b6dff"][i];return'<div class="sc"><div class="sc-num">'+("0"+(i+1)).slice(-2)+'</div><div class="sc-name">'+n+'</div><div class="sc-desc">'+d+'</div><div class="sc-pill" style="background:'+p+';opacity:.15;color:'+p+'">'+["Gap","Gap","Cruce","Cruce","BB","BB","BB","TRIPLE"][i]+'</div></div>';}).join('')+'</div>';}
r();bCh("BTC","1h");uPB();uS();
(function(){try{var cf=JSON.parse(localStorage.getItem("m_fng"));if(cf&&Date.now()-cf.t<120000){fng=cf.v;fngl=cf.l;if(typeof uS==="function")uS();}}catch(e){}fetch("https://api.alternative.me/fng/?limit=1",{signal:AbortSignal.timeout(5000)}).then(function(r){return r.json();}).then(function(d){if(d&&d.data&&d.data[0]){fng=+d.data[0].value;fngl=d.data[0].value_classification;try{localStorage.setItem("m_fng",JSON.stringify({t:Date.now(),v:fng,l:fngl}))}catch(e){}uS();}}).catch(function(){});})();
setInterval(function(){$("ts").textContent=new Date().toLocaleTimeString("es-ES");},1000);
setInterval(function(){uPB();},15000);
setInterval(function(){if(pr[cc]){cp=pr[cc].price;bCh(cc,ct);uS();}},60000);
</script></body></html>
