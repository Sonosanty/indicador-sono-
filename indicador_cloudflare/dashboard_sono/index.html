<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Indicador Sono — Dashboard Cuantitativo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a1428;--surface:rgba(20,35,60,0.5);--surface2:#0f1d35;--green:#16a34a;--red:#dc2626;--gold:#eab308;--teal:#14b8a6;--blue:#3b82f6;--txt:#e2e8f0;--dim:#64748b;--dim2:#94a3b8;--border:rgba(120,160,220,0.08);--radius:14px;--font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',Consolas,monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
#ov{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
#ov.h{display:none}
#app{opacity:0;transition:opacity .5s}
.sp{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:s .8s linear infinite}
@keyframes s{to{transform:rotate(360deg)}}
.nav{display:flex;gap:8px;padding:14px 24px;background:var(--surface2);border-bottom:1px solid var(--border);align-items:center;backdrop-filter:blur(8px);position:sticky;top:0;z-index:100}
.nav .b{color:var(--txt);font-weight:700;font-size:14px;margin-right:24px;letter-spacing:0.3px}
.nav .p{display:flex;gap:4px;margin-left:auto}
.nav .p a{color:var(--dim);text-decoration:none;padding:6px 18px;border-radius:999px;font-size:12px;font-weight:500;transition:all .15s}
.nav .p a.a{background:rgba(22,163,74,0.12);color:var(--green)}
.nav .p a:hover{background:rgba(255,255,255,0.04);color:var(--txt)}
.page{padding:20px 24px;max-width:1400px;margin:0 auto}
.sec{margin-bottom:28px}
.sec_h{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.sec_h h2{font-size:16px;font-weight:600;color:var(--txt);letter-spacing:-0.2px}
.sec_h .sub{color:var(--dim);font-size:12px}
.gr{display:grid;gap:14px}
.gr4{grid-template-columns:repeat(4,1fr)}
.gr3{grid-template-columns:repeat(3,1fr)}
.gr2{grid-template-columns:repeat(2,1fr)}
.c{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:22px 26px;backdrop-filter:blur(4px);position:relative;overflow:hidden}
.c .l{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:500;margin-bottom:2px}
.c .v{font-family:var(--mono);font-size:clamp(20px,2.2vw,28px);font-weight:600;font-variant-numeric:tabular-nums;line-height:1.2}
.c .sl{color:var(--dim2);font-size:13px;margin-top:2px;font-weight:400}
.c .ft{color:var(--dim);font-size:10px;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)}
.c .ft span{margin-right:12px}
.c .badge{position:absolute;top:14px;right:18px;padding:2px 10px;border-radius:999px;font-size:10px;font-weight:600}
.g{color:var(--green)}.r{color:var(--red)}.y{color:var(--gold)}.t{color:var(--teal)}.b{color:var(--blue)}
.bg-green{background:rgba(22,163,74,0.15);color:var(--green)}
.bg-red{background:rgba(220,38,38,0.15);color:var(--red)}
.bg-yellow{background:rgba(234,179,8,0.15);color:var(--gold)}
.gauge{display:flex;align-items:center;gap:10px;margin:6px 0}
.gauge .lb{color:var(--dim);font-size:11px;min-width:60px}
.gauge .bar{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.04);overflow:hidden}
.gauge .bar_f{height:100%;border-radius:2px;transition:width .4s}
.gauge .vl{font-family:var(--mono);font-size:11px;min-width:50px;text-align:right;color:var(--dim2)}
.score_ring{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:24px;font-weight:700;font-family:var(--mono);position:relative}
.score_ring::after{content:'';position:absolute;width:60px;height:60px;border-radius:50%;background:var(--surface);z-index:0}
.score_ring span{position:relative;z-index:1}
.tf_grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.tf_card{background:var(--surface2);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px}
.tf_card h4{color:var(--dim);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.tf_card .v{font-family:var(--mono);font-size:15px;font-weight:600}
.tl{max-height:220px;overflow-y:auto;margin-top:6px}
.tl_item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid rgba(255,255,255,0.03)}
.tl_item:last-child{border:none}
.tl_t{color:var(--dim);font-family:var(--mono);font-size:10px;min-width:50px}
.tl_s{font-weight:600;font-size:10px;min-width:85px}
.tl_sc{font-family:var(--mono);font-weight:600;min-width:28px;text-align:right;font-size:11px}
.tl_p{color:var(--dim);font-family:var(--mono);font-size:10px;margin-left:auto}
.tl_empty{color:var(--dim);text-align:center;padding:20px;font-size:12px}
@media(max-width:1024px){.gr4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.gr4,.gr3,.gr2{grid-template-columns:1fr}.page{padding:12px 14px}.nav{padding:10px 14px}.nav .p a{padding:4px 10px;font-size:10px}.c{padding:16px 18px}.tf_grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="ov"><div class="sp"></div><div style="color:var(--dim);font-size:13px">Cargando datos desde Binance + CoinGecko...</div></div>
<div id="app">
<div class="nav"><span class="b">SONO PRO</span><div class="p"><a href="/">Macro</a><a href="/dashboard_sono/" class="a">Dashboard</a><a href="/trades/">Trades</a></div></div>
<div class="page">

<!-- Tickers -->
<div class="sec"><div class="gr gr4" id="tickers"></div></div>

<!-- Score Maestro + KPIs -->
<div class="sec_h"><h2>Score Maestro</h2><span class="sub">Score Sono · RSI · ADX · Trend</span></div>
<div class="sec"><div class="gr gr4" id="scoreRow"></div></div>

<!-- Pilares + Rango -->
<div class="sec"><div class="gr gr3" id="detailRow"></div></div>

<!-- Range Intelligence -->
<div class="sec_h"><h2>Range Intelligence</h2><span class="sub">Multi-timeframe · Zonas · Presión · Sweeps</span></div>
<div class="sec"><div class="gr gr2" id="tfGrid"></div></div>

<!-- Timeline -->
<div class="sec_h"><h2>Timeline de Señales</h2><span class="sub">Últimas 50</span></div>
<div class="sec"><div class="c" style="padding:14px 20px"><div class="tl" id="timeline"><div class="tl_empty">Esperando primera señal…</div></div></div></div>

</div></div>
<script>
var A={BTC:{s:'BTCUSDT',d:2,c:'#F7931A',n:'Bitcoin'},ETH:{s:'ETHUSDT',d:2,c:'#627EEA',n:'Ethereum'},SOL:{s:'SOLUSDT',d:3,c:'#9945FF',n:'Solana'},XRP:{s:'XRPUSDT',d:4,c:'#00AAE4',n:'Ripple'}};
var U='https://api.binance.com/api/v3',CG='https://api.coingecko.com/api/v3';
var T={},sigLog=[],active='BTC',tfIntervals=['1m','3m','5m','15m'],tfData={};
var g=function(id){return document.getElementById(id)};
var t=function(id,tx){var e=g(id);if(e)e.textContent=tx};
var h=function(id,hx){var e=g(id);if(e)e.innerHTML=hx};
var fn=function(n,d){if(n==null)return'—';return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})};
var fmt=function(n){if(n==null)return'—';return Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})};

function calcMA(arr,p){if(!arr||arr.length<p)return null;var s=0;for(var i=arr.length-p;i<arr.length;i++)s+=arr[i];return s/p}
function calcRSI(closes,p){p=p||14;if(!closes||closes.length<=p)return null;var g=0,l=0;for(var i=closes.length-p;i<closes.length;i++){var d=closes[i]-closes[i-1];if(d>0)g+=d;else l-=d}var ag=g/p,al=l/p;return al===0?100:Math.round((100-100/(1+ag/al))*100)/100}
function calcBB(closes,p,m){p=p||20;m=m||2;if(!closes||closes.length<p)return null;var sl=closes.slice(-p),ma=sl.reduce(function(s,v){return s+v},0)/p,std=Math.sqrt(sl.reduce(function(s,v){return s+(v-ma)**2},0)/p);return{u:ma+m*std,m:ma,l:ma-m*std}}
function calcADX(candles,p){p=p||14;if(!candles||candles.length<p*2)return null;var sl=candles.slice(-(p*2)),dmP=0,dmM=0,tr=0;for(var i=1;i<sl.length;i++){var c=sl[i],pv=sl[i-1],up=c.high-pv.high,dn=pv.low-c.low;dmP+=up>dn&&up>0?up:0;dmM+=dn>up&&dn>0?dn:0;tr+=Math.max(c.high-c.low,Math.abs(c.high-pv.close),Math.abs(c.low-pv.close))}return tr===0?0:Math.round(Math.abs(dmP-dmM)/(dmP+dmM+0.001)*1000)/10}

function computeScore(candles){
  if(!candles||candles.length<210)return null;
  var closes=candles.map(function(c){return c.close}),price=closes[closes.length-1];
  var ma6=calcMA(closes,6),ma40=calcMA(closes,40),ma70=calcMA(closes,70);
  var bb=calcBB(closes,20),adx=calcADX(candles,14),rsi=calcRSI(closes,14);
  var p1=0;
  if(ma6!==null&&ma40!==null&&ma70!==null){
    if(ma6>ma40){p1=25;if(ma40>ma70)p1=35;if(ma6>ma70)p1=45}else{p1=5;if(ma40<ma70)p1=0}
  }
  var p2=10;
  if(adx!==null&&rsi!==null){var trend=adx>25?1:0;p2=trend?(rsi>55?30:rsi<45?5:20):(rsi>55?20:rsi<45?10:15)}
  var p3=10;
  if(bb!==null&&price!==null){var pctB=(price-bb.l)/(bb.u-bb.l);p3=pctB<0.2?35:pctB<0.4?25:pctB<0.6?15:pctB<0.8?10:5}
  var total=Math.min(100,Math.max(0,p1+p2+p3));
  var signal='NEUTRAL',decision='ESPERAR',level=0;
  if(total>=78){signal='COMPRA FUERTE';decision='LONG';level=5}else if(total>=62){signal='COMPRA';decision='LONG';level=4}else if(total>=52){signal='ACUMULACION';decision='LONG DEBIL';level=3}else if(total>=42){signal='NEUTRAL';decision='ESPERAR';level=2}else if(total>=30){signal='DISTRIBUCION';decision='SHORT DEBIL';level=1}else if(total>=18){signal='VENTA';decision='SHORT';level=0}else{signal='CAPITULACION';decision='SHORT';level=0}
  if(rsi!==null&&rsi<28&&total<52){signal='CAPITULACION';decision='SHORT';level=0}
  if(rsi!==null&&rsi>72&&total>=62){signal='COMPRA FUERTE';decision='LONG';level=5}
  return{total:Math.round(total),p1:Math.round(p1),p2:Math.round(p2),p3:Math.round(p3),ma6:ma6,ma40:ma40,ma70:ma70,rsi:rsi,adx:adx,bb:bb,signal:signal,decision:decision,level:level,price:price};
}

function rangeAnal(candles){
  if(!candles||candles.length<50)return null;
  var closes=candles.map(function(c){return c.close}),highs=candles.map(function(c){return c.high}),lows=candles.map(function(c){return c.low});
  var price=closes[closes.length-1],hi=Math.max.apply(null,highs.slice(-50)),lo=Math.min.apply(null,lows.slice(-50)),rng=hi-lo;
  if(rng===0)return{zone:'MID',pct:50,hi:hi,lo:lo,pressure:'NEUTRAL',sweeps:0};
  var pct=((price-lo)/rng)*100,zone=pct>80?'HIGH':pct<20?'LOW':'MID';
  var vol=candles.slice(-20).reduce(function(s,c){return s+c.volume},0)/20;
  var volChg=vol>0?candles.slice(-20).reduce(function(s,c){return s+c.volume},0)/Math.max(0.001,candles.slice(-40,-20).reduce(function(s,c){return s+c.volume},0)):1;
  var pressure=volChg>1.5?'ALTA VOL':'NORMAL';
  if(pct<20&&volChg>1.3)pressure='LIQUIDEZ BAJA';
  if(pct>80&&volChg>1.3)pressure='LIQUIDEZ ALTA';
  var sweeps=0;for(var i=Math.max(0,candles.length-50);i<candles.length;i++){if(candles[i].low<lo+candles[i].low*0.001||candles[i].high>hi-candles[i].high*0.001)sweeps++}
  return{zone:zone,pct:pct,hi:hi,lo:lo,pressure:pressure,sweeps:sweeps,price:price};
}

function toLabel(sig){var m={5:'COMPRA FUERTE',4:'COMPRA',3:'ACUMULACION',2:'NEUTRAL',1:'DISTRIBUCION',0:'VENTA'};return m[sig]||'—'}
function toBadge(sig){var m={5:'bg-green',4:'bg-green',3:'bg-yellow',2:'',1:'bg-red',0:'bg-red'};return m[sig]||''}
function toLevel(sig){var m={5:5,4:4,3:3,2:2,1:1,0:0};return m[sig]!==undefined?m[sig]:2}

async function lt(k){try{var r=await fetch(U+'/ticker/24hr?symbol='+A[k].s,{signal:AbortSignal.timeout(8e3)});var d=await r.json();T[k]={p:+d.lastPrice,c:+d.priceChangePercent,h:+d.highPrice,l:+d.lowPrice,q:+d.quoteVolume}}catch(e){}}

async function lc(k){try{var r=await fetch(U+'/klines?symbol='+A[k].s+'&interval=3m&limit=400',{signal:AbortSignal.timeout(10e3)});var raw=await r.json();return raw.map(function(kk){return{time:+kk[0],open:+kk[1],high:+kk[2],low:+kk[3],close:+kk[4],volume:+kk[5]}})}catch(e){return null}}

async function lcTF(k,tf){try{var r=await fetch(U+'/klines?symbol='+A[k].s+'&interval='+tf+'&limit=80',{signal:AbortSignal.timeout(8e3)});var raw=await r.json();return raw.map(function(kk){return{time:+kk[0],open:+kk[1],high:+kk[2],low:+kk[3],close:+kk[4],volume:+kk[5]}})}catch(e){return null}}

async function loadMacro(){try{var r=await fetch('https://api.alternative.me/fng/?limit=1',{signal:AbortSignal.timeout(5e3)});var d=await r.json();if(d&&d.data&&d.data[0])T.fng={v:+d.data[0].value,c:d.data[0].value_classification}}catch(e){}}

function renderTickers(){var gr=g('tickers');if(!gr)return;
var html=Object.keys(A).map(function(k){var t=T[k];if(!t||t.p==null)return'<div class="c"><div class="l">'+A[k].n+'</div><div class="v" style="color:var(--dim)">—</div><div class="sl">—</div><div class="ft"><span>Fuente: Binance '+A[k].s+'</span></div></div>';
var cl=t.c>=0?[['g','bg-green'],['r','bg-red']][0][0]:[['r','bg-red'],['g','bg-green']][0][0];
var bg=t.c>=0?'bg-green':'bg-red';
var badge='<span class="badge '+bg+'">'+(t.c>=0?'+':'')+t.c.toFixed(2)+'%</span>';
return'<div class="c">'+badge+'<div class="l">'+A[k].n+'</div><div class="v '+cl+'">$'+fn(t.p,A[k].d)+'</div><div class="sl">€'+fn(t.p*0.87,A[k].d)+'</div><div class="ft"><span>Fuente: Binance '+A[k].s+'</span><span>· min $'+fn(t.l,A[k].d)+' · max $'+fn(t.h,A[k].d)+' · Δ '+(t.p-t.l>0?'+':'')+fn(t.p-t.l,0)+'</span></div></div>'
}).join('');
h('tickers',html)}

function renderScore(score){
  if(!score){h('scoreRow','<div class="c" style="text-align:center"><div class="score_ring" style="background:rgba(100,116,139,0.1)"><span style="color:var(--dim);font-size:18px">—</span></div><div class="l">Score Maestro</div></div>');return}
  var scCol=score.total>=78?'var(--green)':score.total>=62?'var(--green)':score.total>=52?'var(--gold)':score.total>=42?'var(--gold)':score.total>=30?'var(--red)':'var(--red)';
  var badgeCl=score.total>=62?'bg-green':score.total>=52?'bg-yellow':'bg-red';
  var label=score.signal;
  h('scoreRow',
    '<div class="c" style="text-align:center"><div class="score_ring" style="background:conic-gradient('+scCol+' 0%, '+scCol+' '+(score.total*3.6)+'deg, rgba(255,255,255,0.04) '+(score.total*3.6)+'deg)"><span style="color:'+scCol+'">'+score.total+'</span></div><div class="l">Score Maestro</div><div class="sl" style="color:'+scCol+';font-weight:600">'+label+' · '+score.level+'/5</div><div class="ft"><span>'+score.decision+'</span><span>· Pilares '+score.p1+'+'+score.p2+'+'+score.p3+'</span></div></div>'+
    '<div class="c"><div class="l">RSI (14)</div><div class="v '+(score.rsi>70?'r':score.rsi<30?'g':'')+'">'+(score.rsi!=null?score.rsi:'—')+'</div><div class="sl">'+(score.rsi!=null?(score.rsi>70?'SOBRECOMPRA':score.rsi<30?'SOBREVENTA':'NEUTRAL'):'—')+'</div><div class="ft"><span>Rango 0-100</span><span>· SMA period 14</span></div></div>'+
    '<div class="c"><div class="l">ADX (14)</div><div class="v '+(score.adx>25?'y':'')+'">'+(score.adx!=null?score.adx:'—')+'</div><div class="sl">'+(score.adx!=null?(score.adx>25?'TREND ALCISTA':'RANGO'):'—')+'</div><div class="ft"><span>DMI period 14</span></div></div>'+
    '<div class="c"><div class="l">TREND</div><div class="v '+(score.ma6!=null&&score.ma6>score.ma40?'g':'r')+'">'+(score.ma6!=null&&score.ma40!=null?(score.ma6>score.ma40?'ALCISTA':'BAJISTA'):'—')+'</div><div class="sl">MA6 '+(score.ma6!=null?'$'+fn(score.ma6,2):'—')+' · MA40 '+(score.ma40!=null?'$'+fn(score.ma40,2):'—')+'</div><div class="ft"><span>MA70 '+(score.ma70!=null?'$'+fn(score.ma70,2):'—')+'</span></div></div>');
}

function renderDetail(score,candles){
  var ra=candles?rangeAnal(candles):null;
  h('detailRow',
    '<div class="c"><div class="l">PILARES</div>'+[['Tendencia','var(--green)',score?score.p1+'/45':'—/45'],['M. Interno','var(--gold)',score?score.p2+'/30':'—/30'],['Precio','var(--gold)',score?score.p3+'/35':'—/35']].map(function(p){return'<div class="gauge"><span class="lb">'+p[0]+'</span><div class="bar"><div class="bar_f" style="width:'+(score?Math.round(parseInt(p[2])/45*100):0)+'%;background:'+p[1]+'"></div></div><span class="vl" style="color:'+p[1]+'">'+p[2]+'</span></div>'}).join('')+'</div>'+
    '<div class="c"><div class="l">RANGO</div><div class="v" style="font-size:16px;'+(ra?'color:'+(ra.zone==='HIGH'?'var(--red)':ra.zone==='LOW'?'var(--green)':'var(--dim)')+';':'')+'">'+(ra?ra.zone+' ('+Math.round(ra.pct)+'%)':'—')+'</div><div class="sl">Presión: <span style="color:'+(ra&&ra.pressure==='LIQUIDEZ ALTA'?'var(--red)':ra&&ra.pressure==='NORMAL'?'var(--dim)':'var(--gold)')+'">'+(ra?ra.pressure:'—')+'</span></div><div class="ft"><span>Sweeps: '+(ra?ra.sweeps:'0')+'</span><span>· Rango $'+(ra?fn(ra.lo,2):'—')+' · $'+(ra?fn(ra.hi,2):'—')+'</span></div></div>'+
    '<div class="c"><div class="l">ESTADO MACRO</div><div class="v" style="font-size:18px;'+(T.fng?'color:var(--gold);':'')+'">'+(T.fng?T.fng.c:'Cargando...')+'</div><div class="sl">'+(T.fng?'F&G: '+T.fng.v+'/100':'')+'</div><div class="ft"><span>Fuente: alternative.me</span><span>· Índice de miedo/avaricia</span></div></div>');
}

function renderTFGrid(){var grid=g('tfGrid');if(!grid)return;
var html='';for(var i=0;i<tfIntervals.length;i++){var tf=tfIntervals[i];var cdl=tfData[tf];var ra=cdl?rangeAnal(cdl):null;var sc=cdl?computeScore(cdl):null;
var zc='var(--dim)';if(ra){zc=ra.zone==='HIGH'?'var(--red)':ra.zone==='LOW'?'var(--green)':'var(--dim)'}
var pc='var(--dim)';if(ra){pc=ra.pressure==='LIQUIDEZ ALTA'||ra.pressure==='LIQUIDEZ BAJA'?'var(--red)':ra.pressure==='ALTA VOL'?'var(--gold)':'var(--dim)'}
html+='<div class="tf_card"><h4>'+tf+'</h4>'+(ra?'<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="v" style="font-size:13px;color:'+zc+'">Zona '+ra.zone+'</span><span class="v" style="font-size:13px">'+Math.round(ra.pct)+'%</span></div><div class="gauge"><span class="lb">Presión</span><span class="vl" style="color:'+pc+'">'+ra.pressure+'</span></div><div class="gauge"><span class="lb">Sweeps</span><span class="vl">'+ra.sweeps+'</span></div>'+(sc?'<div class="gauge" style="margin-top:2px"><span class="lb">Score</span><span class="vl" style="font-weight:600;color:'+(sc.total>=62?'var(--green)':sc.total<=30?'var(--red)':'var(--gold)')+'">'+sc.total+' · '+sc.signal.substring(0,10)+'</span></div>':'')+'<div class="ft" style="margin-top:6px;padding-top:6px"><span>min $'+(ra?fn(ra.lo,2):'—')+' · max $'+(ra?fn(ra.hi,2):'—')+'</span></div>':'<div class="tl_empty" style="padding:8px">Cargando...</div>')+'</div>'}
h('tfGrid',html)}

function addSignal(score){if(!score)return;
var sig={id:Date.now(),time:new Date(),signal:score.signal,decision:score.decision,score:score.total,level:score.level,price:score.price};
sigLog=[sig].concat(sigLog).slice(0,50);try{localStorage.setItem('sono_signals',JSON.stringify(sigLog))}catch(e){};renderTimeline()}

function renderTimeline(){var tl=g('timeline');if(!tl)return;
if(!sigLog.length){h('timeline','<div class="tl_empty">Esperando primera señal…<br><span style="font-size:10px">Se calcula cada 30s desde velas 3m de Binance</span></div>');return}
h('timeline',sigLog.map(function(s,i){var c=s.signal.includes('COMPRA')||s.signal.includes('ACUMU')?'var(--green)':s.signal.includes('VENTA')||s.signal.includes('CAPIT')||s.signal.includes('DIST')?'var(--red)':'var(--dim)';var t=new Date(s.time).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit',second:'2-digit'});return'<div class="tl_item" style="border-left:2px solid '+c+';padding-left:6px"><span class="tl_t">'+t+'</span><span class="tl_s" style="color:'+c+'">'+s.signal+'</span><span class="tl_sc" style="color:'+c+'">'+s.score+'</span><span class="tl_p">'+(s.price?'$'+fn(s.price,2):'')+'</span></div>'}).join(''))}

async function scan(){var candles3m=await lc(active);
if(candles3m){var score=computeScore(candles3m);renderScore(score);renderDetail(score,candles3m);if(score&&(!window.lastSig||window.lastSig.signal!==score.signal||Math.abs(window.lastSig.score-score.total)>=10)){window.lastSig=score;addSignal(score)}}
for(var i=0;i<tfIntervals.length;i++){var cdl=await lcTF(active,tfIntervals[i]);if(cdl)tfData[tfIntervals[i]]=cdl}
renderTFGrid()}

async function init(){await Promise.all(Object.keys(A).map(function(k){return lt(k).catch(function(){})}));
renderTickers();loadMacro();try{var s=localStorage.getItem('sono_signals');if(s){sigLog=JSON.parse(s);renderTimeline()}}catch(e){}
await scan();setInterval(scan,30000)
if(localStorage.getItem('sono_signals'))renderTimeline()
setTimeout(function(){var o=g('ov');if(o)o.classList.add('h');var a=g('app');if(a)a.style.opacity='1'},500)}
init();
</script>
